<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 182 120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8d6e5"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark navy background -->
  <rect width="182" height="120" fill="#0d1b2a" rx="10"/>

  <!-- "C" — white, bold. Ends around x=67 -->
  <text x="2" y="93"
    font-family="'Arial Black', Impact, 'Haettenschweiler', sans-serif"
    font-weight="900"
    font-size="96"
    fill="url(#whiteGrad)">C</text>

  <!-- "B" — gold/yellow, bold. Starts at x=78 — close gap to C -->
  <text x="78" y="93"
    font-family="'Arial Black', Impact, 'Haettenschweiler', sans-serif"
    font-weight="900"
    font-size="96"
    fill="url(#goldGrad)">B</text>

  <!-- Candlesticks — sit in the ~11px gap between C and B, overlapping slightly into both letters -->

  <!-- Green candle (left) -->
  <line x1="68"  y1="14" x2="68"  y2="78" stroke="#2ecc71" stroke-width="1.6" filter="url(#glow)"/>
  <rect x="64.5" y="24"  width="7" height="36" fill="#2ecc71" rx="1.2"/>

  <!-- Red candle (center — tallest) -->
  <line x1="79"  y1="10" x2="79"  y2="81" stroke="#e74c3c" stroke-width="1.6" filter="url(#glow)"/>
  <rect x="75.5" y="18"  width="7" height="43" fill="#e74c3c" rx="1.2"/>

  <!-- Green candle (right) -->
  <line x1="90"  y1="17" x2="90"  y2="76" stroke="#2ecc71" stroke-width="1.6" filter="url(#glow)"/>
  <rect x="86.5" y="27"  width="7" height="31" fill="#2ecc71" rx="1.2"/>

  <!-- MARKETS label -->
  <text x="91" y="114"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="12.5"
    fill="#94a3b8"
    text-anchor="middle"
    letter-spacing="6">MARKETS</text>
</svg>
