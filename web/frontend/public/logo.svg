<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 122">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8d6e5"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark navy background -->
  <rect width="165" height="122" fill="#0d1b2a" rx="10"/>

  <!-- "C" — white. At 96px, C glyph width ≈ 63px → ends at ~x=64 -->
  <text x="1" y="92"
    font-family="'Arial Black', Impact, 'Haettenschweiler', sans-serif"
    font-weight="900"
    font-size="96"
    fill="url(#whiteGrad)">C</text>

  <!-- "B" — gold. Starts at x=65 → almost touching C (1px gap) -->
  <text x="65" y="92"
    font-family="'Arial Black', Impact, 'Haettenschweiler', sans-serif"
    font-weight="900"
    font-size="96"
    fill="url(#goldGrad)">B</text>

  <!-- Candlesticks — overlap INTO the C opening (left) and INTO B (right) -->

  <!-- Green candle — sits inside C's right-side opening -->
  <line x1="62"  y1="13" x2="62"  y2="78" stroke="#27ae60" stroke-width="1.8" filter="url(#glow)"/>
  <rect x="58"   y="24"  width="8" height="34" fill="#2ecc71" rx="1.2"/>

  <!-- Red candle — tallest, straddles the C/B junction -->
  <line x1="74"  y1="9"  x2="74"  y2="81" stroke="#c0392b" stroke-width="1.8" filter="url(#glow)"/>
  <rect x="70"   y="17"  width="8" height="44" fill="#e74c3c" rx="1.2"/>

  <!-- Green candle — overlaps into B's left side -->
  <line x1="86"  y1="16" x2="86"  y2="77" stroke="#27ae60" stroke-width="1.8" filter="url(#glow)"/>
  <rect x="82"   y="26"  width="8" height="30" fill="#2ecc71" rx="1.2"/>

  <!-- MARKETS label — centered -->
  <text x="82" y="115"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="12"
    fill="#94a3b8"
    text-anchor="middle"
    letter-spacing="6">MARKETS</text>
</svg>
